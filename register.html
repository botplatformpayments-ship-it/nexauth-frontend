<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NexAuth — Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #050508; --bg2: #0c0c14; --surface: #111120;
      --border: #1e1e35; --accent: #6c63ff; --accent2: #ff6b6b;
      --accent3: #00e5ff; --text: #e8e8f0; --muted: #6b6b8a;
      --success: #00e676; --error: #ff5252;
      --font-head: 'Syne', sans-serif; --font-mono: 'DM Mono', monospace;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font-mono); min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow-x: hidden; padding: 40px 24px; }
    body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 40px 40px; opacity: 0.25; pointer-events: none; }
    .blob { position: fixed; border-radius: 50%; filter: blur(100px); pointer-events: none; }
    .blob-1 { width: 500px; height: 500px; background: var(--accent); top: -150px; left: -150px; opacity: 0.1; }
    .blob-2 { width: 350px; height: 350px; background: var(--accent2); bottom: -100px; right: -100px; opacity: 0.08; }
    .wrap { position: relative; z-index: 10; width: 100%; max-width: 460px; }
    .back-link { display: inline-flex; align-items: center; gap: 8px; color: var(--muted); text-decoration: none; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 32px; transition: color 0.2s; }
    .back-link:hover { color: var(--text); }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px 36px; box-shadow: 0 40px 80px rgba(0,0,0,0.5); animation: fadeUp 0.5s ease both; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .card-logo { display: flex; align-items: center; gap: 10px; font-family: var(--font-head); font-size: 1.3rem; font-weight: 800; margin-bottom: 32px; }
    .logo-icon { width: 30px; height: 30px; background: linear-gradient(135deg, var(--accent), var(--accent3)); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; }
    .logo-accent { color: var(--accent); }
    .card-title { font-family: var(--font-head); font-size: 1.6rem; font-weight: 800; margin-bottom: 6px; }
    .card-sub { color: var(--muted); font-size: 0.82rem; margin-bottom: 32px; line-height: 1.7; }
    .form-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 8px; }
    input { width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; font-family: var(--font-mono); font-size: 0.88rem; color: var(--text); outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(108,99,255,0.15); }
    input::placeholder { color: var(--muted); }
    .strength-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden; }
    .strength-fill { height: 100%; width: 0%; border-radius: 2px; transition: width 0.3s, background 0.3s; }
    .terms { display: flex; align-items: flex-start; gap: 10px; margin: 20px 0; }
    .terms input[type=checkbox] { width: auto; margin-top: 2px; accent-color: var(--accent); }
    .terms label { font-size: 0.78rem; color: var(--muted); text-transform: none; letter-spacing: 0; margin: 0; }
    .terms a { color: var(--accent); text-decoration: none; }
    .btn-submit { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 14px; font-family: var(--font-mono); font-size: 0.88rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; box-shadow: 0 0 24px rgba(108,99,255,0.35); transition: all 0.2s; }
    .btn-submit:hover { background: #7c74ff; transform: translateY(-1px); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .login-link { text-align: center; font-size: 0.8rem; color: var(--muted); margin-top: 20px; }
    .login-link a { color: var(--accent); text-decoration: none; }
    .msg { border-radius: 8px; padding: 12px 16px; font-size: 0.8rem; margin-bottom: 20px; display: none; }
    .msg.show { display: block; animation: fadeUp 0.3s ease; }
    .msg.error { background: rgba(255,82,82,0.1); border: 1px solid rgba(255,82,82,0.3); color: var(--error); }
    .msg.success { background: rgba(0,230,118,0.1); border: 1px solid rgba(0,230,118,0.3); color: var(--success); }
  </style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="wrap">
  <a href="index.html" class="back-link">← Back to Home</a>
  <div class="card">
    <div class="card-logo">
      <div class="logo-icon">&#11041;</div>
      Nex<span class="logo-accent">Auth</span>
    </div>

    <h1 class="card-title">Create account.</h1>
    <p class="card-sub">Join NexAuth and start protecting your software in minutes. Free forever.</p>

    <div class="msg" id="msg"></div>

    <div class="form-row2">
      <div class="form-group">
        <label>First Name</label>
        <input type="text" id="fname" placeholder="John"/>
      </div>
      <div class="form-group">
        <label>Last Name</label>
        <input type="text" id="lname" placeholder="Doe"/>
      </div>
    </div>

    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="john_doe" autocomplete="off"/>
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="john@example.com"/>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Min 8 characters" oninput="checkStrength(this.value)"/>
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
    </div>

    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="confirm" placeholder="Repeat password"/>
    </div>

    <div class="terms">
      <input type="checkbox" id="terms"/>
      <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
    </div>

    <button class="btn-submit" id="registerBtn" onclick="handleRegister()">Create Account</button>
    <p class="login-link">Already have an account? <a href="login.html">Sign in</a></p>
  </div>
</div>

<script>
  function showMsg(text, type) {
    var msgEl = document.getElementById('msg');
    msgEl.textContent = text;
    msgEl.className = 'msg show ' + type;
  }

  function checkStrength(val) {
    var fill = document.getElementById('strengthFill');
    var score = 0;
    if (val.length >= 8) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    fill.style.width = (score / 4 * 100) + '%';
    fill.style.background = score <= 1 ? '#ff5252' : score === 2 ? '#ff9a3c' : score === 3 ? '#febc2e' : '#00e676';
  }

  async function handleRegister() {
    var fname    = document.getElementById('fname').value.trim();
    var lname    = document.getElementById('lname').value.trim();
    var username = document.getElementById('username').value.trim();
    var email    = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;
    var confirm  = document.getElementById('confirm').value;
    var terms    = document.getElementById('terms').checked;
    var btn      = document.getElementById('registerBtn');

    if (!fname || !lname || !username || !email || !password) {
      showMsg('Please fill in all fields.', 'error'); return;
    }
    if (password.length < 8) {
      showMsg('Password must be at least 8 characters.', 'error'); return;
    }
    if (password !== confirm) {
      showMsg('Passwords do not match.', 'error'); return;
    }
    if (!terms) {
      showMsg('Please accept the Terms of Service.', 'error'); return;
    }

    btn.textContent = 'Creating...';
    btn.disabled = true;

    try {
      var res = await fetch('https://nexauth-backend.onrender.com/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: username, email: email, password: password, firstName: fname, lastName: lname })
      });
      var data = await res.json();

      if (data.success) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        showMsg('Account created! Redirecting...', 'success');
        setTimeout(function() { window.location.href = 'dashboard.html'; }, 1500);
      } else {
        showMsg(data.message || 'Registration failed.', 'error');
        btn.textContent = 'Create Account';
        btn.disabled = false;
      }
    } catch (err) {
      showMsg('Server error. Please try again.', 'error');
      btn.textContent = 'Create Account';
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
