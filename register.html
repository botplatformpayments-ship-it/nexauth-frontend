<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NexAuth — Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --card: #12121a;
      --border: #1e1e2e;
      --accent: #7c3aed;
      --accent2: #06b6d4;
      --text: #e2e8f0;
      --muted: #64748b;
      --success: #10b981;
      --error: #ef4444;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -30%;
      left: -20%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(124,58,237,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -20%;
      right: -10%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(6,182,212,0.1) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem;
      width: 100%;
      max-width: 480px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.5s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1.8rem;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .logo-text {
      font-size: 1.3rem;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 0.4rem; }
    .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.8rem; }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .field { margin-bottom: 1rem; }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: var(--accent); }

    .strength-bar {
      height: 3px;
      background: var(--border);
      border-radius: 99px;
      margin-top: 6px;
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      width: 0%;
      border-radius: 99px;
      transition: width 0.3s, background 0.3s;
      background: var(--error);
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 1.2rem 0;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .checkbox-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .checkbox-row a { color: var(--accent); text-decoration: none; }

    .btn-submit {
      width: 100%;
      padding: 0.85rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn-submit:hover { opacity: 0.9; }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .alert {
      display: none;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      font-size: 0.88rem;
      margin-bottom: 1rem;
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      color: var(--error);
    }

    .alert.show { display: block; }
    .alert.success {
      background: rgba(16,185,129,0.12);
      border-color: rgba(16,185,129,0.3);
      color: var(--success);
    }

    .footer-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .footer-link a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon">⬡</div>
    <span class="logo-text">NexAuth</span>
  </div>

  <h1>Create Account</h1>
  <p class="subtitle">Join thousands of developers using NexAuth</p>

  <div id="alertBox" class="alert"></div>

  <div class="row">
    <div class="field">
      <label>First Name</label>
      <input type="text" id="fname" placeholder="John" />
    </div>
    <div class="field">
      <label>Last Name</label>
      <input type="text" id="lname" placeholder="Doe" />
    </div>
  </div>

  <div class="field">
    <label>Username</label>
    <input type="text" id="username" placeholder="johndoe" />
  </div>

  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="john@example.com" />
  </div>

  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="Min 8 characters" oninput="checkStrength(this.value)" />
    <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
  </div>

  <div class="field">
    <label>Confirm Password</label>
    <input type="password" id="confirm" placeholder="Repeat password" />
  </div>

  <div class="checkbox-row">
    <input type="checkbox" id="terms" />
    <label for="terms" style="text-transform:none;letter-spacing:0;">
      I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
    </label>
  </div>

  <button class="btn-submit" onclick="handleRegister()">Create Account →</button>

  <div class="footer-link">
    Already have an account? <a href="login.html">Sign in</a>
  </div>
</div>

<script>
  function checkStrength(val) {
    const fill = document.getElementById('strengthFill');
    let score = 0;
    if (val.length >= 8) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    const pct = (score / 4) * 100;
    fill.style.width = pct + '%';
    fill.style.background = score <= 1 ? '#ef4444' : score === 2 ? '#f97316' : score === 3 ? '#eab308' : '#10b981';
  }

  async function handleRegister() {
    // ✅ btn is defined INSIDE the function — no more "not defined" error
    const submitBtn = document.querySelector('.btn-submit');
    const alertBox = document.getElementById('alertBox');

    const fname    = document.getElementById('fname').value.trim();
    const lname    = document.getElementById('lname').value.trim();
    const username = document.getElementById('username').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirm').value;
    const terms    = document.getElementById('terms').checked;

    // Reset alert
    alertBox.className = 'alert';
    alertBox.textContent = '';

    // Validation
    if (!fname || !lname || !username || !email || !password) {
      alertBox.textContent = 'Please fill in all fields.';
      alertBox.classList.add('show');
      return;
    }
    if (password.length < 8) {
      alertBox.textContent = 'Password must be at least 8 characters.';
      alertBox.classList.add('show');
      return;
    }
    if (password !== confirm) {
      alertBox.textContent = 'Passwords do not match.';
      alertBox.classList.add('show');
      return;
    }
    if (!terms) {
      alertBox.textContent = 'Please accept the Terms of Service.';
      alertBox.classList.add('show');
      return;
    }

    // Loading state
    submitBtn.textContent = 'Creating account...';
    submitBtn.disabled = true;

    try {
      const res = await fetch('https://nexauth-backend.onrender.com/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password, firstName: fname, lastName: lname })
      });

      const data = await res.json();

      if (data.success) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        alertBox.textContent = '✓ Account created! Redirecting to dashboard...';
        alertBox.classList.add('show', 'success');
        setTimeout(() => window.location.href = 'dashboard.html', 1500);
      } else {
        alertBox.textContent = data.message || 'Registration failed. Please try again.';
        alertBox.classList.add('show');
        submitBtn.textContent = 'Create Account →';
        submitBtn.disabled = false;
      }
    } catch (err) {
      alertBox.textContent = 'Cannot connect to server. Please try again later.';
      alertBox.classList.add('show');
      submitBtn.textContent = 'Create Account →';
      submitBtn.disabled = false;
    }
  }

  // Allow Enter key to submit
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleRegister();
  });
</script>

</body>
</html>
