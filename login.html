<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NexAuth — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #050508; --bg2: #0c0c14; --surface: #111120;
      --border: #1e1e35; --accent: #6c63ff; --accent2: #ff6b6b;
      --accent3: #00e5ff; --text: #e8e8f0; --muted: #6b6b8a;
      --success: #00e676; --error: #ff5252;
      --font-head: 'Syne', sans-serif; --font-mono: 'DM Mono', monospace;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font-mono); min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow-x: hidden; padding: 40px 24px; }
    body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 40px 40px; opacity: 0.25; pointer-events: none; }
    .blob { position: fixed; border-radius: 50%; filter: blur(100px); pointer-events: none; }
    .blob-1 { width: 500px; height: 500px; background: var(--accent); top: -150px; left: -150px; opacity: 0.1; }
    .blob-2 { width: 350px; height: 350px; background: var(--accent2); bottom: -100px; right: -100px; opacity: 0.08; }
    .wrap { position: relative; z-index: 10; width: 100%; max-width: 420px; }
    .back-link { display: inline-flex; align-items: center; gap: 8px; color: var(--muted); text-decoration: none; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 32px; transition: color 0.2s; }
    .back-link:hover { color: var(--text); }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px 36px; box-shadow: 0 40px 80px rgba(0,0,0,0.5); animation: fadeUp 0.5s ease both; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .card-logo { display: flex; align-items: center; gap: 10px; font-family: var(--font-head); font-size: 1.3rem; font-weight: 800; margin-bottom: 32px; }
    .logo-icon { width: 30px; height: 30px; background: linear-gradient(135deg, var(--accent), var(--accent3)); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; }
    .logo-accent { color: var(--accent); }
    .card-title { font-family: var(--font-head); font-size: 1.6rem; font-weight: 800; margin-bottom: 6px; }
    .card-sub { color: var(--muted); font-size: 0.82rem; margin-bottom: 32px; line-height: 1.7; }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 8px; }
    input { width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; font-family: var(--font-mono); font-size: 0.88rem; color: var(--text); outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(108,99,255,0.15); }
    input::placeholder { color: var(--muted); }
    .forgot { text-align: right; margin-top: -10px; margin-bottom: 18px; }
    .forgot a { font-size: 0.75rem; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .forgot a:hover { color: var(--accent); }
    .btn-submit { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 14px; font-family: var(--font-mono); font-size: 0.88rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; box-shadow: 0 0 24px rgba(108,99,255,0.35); transition: all 0.2s; }
    .btn-submit:hover:not(:disabled) { background: #7c74ff; transform: translateY(-1px); box-shadow: 0 0 36px rgba(108,99,255,0.5); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .register-link { text-align: center; font-size: 0.8rem; color: var(--muted); margin-top: 20px; }
    .register-link a { color: var(--accent); text-decoration: none; }
    .alertBox { background: rgba(255,82,82,0.1); border: 1px solid rgba(255,82,82,0.3); border-radius: 8px; padding: 12px 16px; font-size: 0.8rem; color: var(--error); margin-bottom: 20px; display: none; }
    .alertBox.show { display: block; animation: fadeUp 0.3s ease; }
    .alertBox.success { background: rgba(0,230,118,0.1); border-color: rgba(0,230,118,0.3); color: var(--success); }
  </style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="wrap">
  <a href="index.html" class="back-link">← Back to Home</a>
  <div class="card">
    <div class="card-logo">
      <div class="logo-icon">⬡</div>
      Nex<span class="logo-accent">Auth</span>
    </div>
    <h1 class="card-title">Welcome back.</h1>
    <p class="card-sub">Sign in to your NexAuth account to manage your apps and licenses.</p>

    <div class="alertBox" id="alertBox"></div>

    <div class="form-group">
      <label>Username or Email</label>
      <input type="text" id="username" placeholder="john_doe" autocomplete="off"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Your password"/>
    </div>
    <div class="forgot">
      <a href="#">Forgot password?</a>
    </div>

    <button class="btn-submit" id="submitBtn" onclick="handleLogin()">Sign In →</button>
    <p class="register-link">Don't have an account? <a href="register.html">Create one →</a></p>
  </div>
</div>

<script>
  async function handleLogin() {
    // ✅ btn defined INSIDE function
    const btn = document.getElementById('submitBtn');
    // ✅ alertBox instead of alert
    const alertBox = document.getElementById('alertBox');

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    alertBox.className = 'alertBox';
    alertBox.textContent = '';

    if (!username || !password) {
      alertBox.textContent = 'Please fill in all fields.';
      alertBox.classList.add('show'); return;
    }

    btn.textContent = 'Signing in...';
    btn.disabled = true;

    try {
      // ✅ Correct API URL
      const res = await fetch('https://nexauth-backend.onrender.com/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();

      if (data.success) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        alertBox.textContent = '✓ Login successful! Redirecting...';
        alertBox.classList.add('show', 'success');
        setTimeout(() => window.location.href = 'dashboard.html', 1200);
      } else {
        alertBox.textContent = data.message || 'Invalid credentials.';
        alertBox.classList.add('show');
        btn.textContent = 'Sign In →';
        btn.disabled = false;
      }
    } catch (err) {
      alertBox.textContent = 'Server error. Please try again.';
      alertBox.classList.add('show');
      btn.textContent = 'Sign In →';
      btn.disabled = false;
    }
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleLogin();
  });
</script>
</body>
</html>
